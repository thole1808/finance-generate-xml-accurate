name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build EXE
        run: python -m PyInstaller --noconsole --onefile --name "Generate Accurate XML" app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generate-Accurate-XML-Windows
          path: dist/Generate Accurate XML.exe
